<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panther Charlie Apparels</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    text-align: center;
}
header {
    background: #111;
    color: #ffcc00;
    padding: 20px;
}
nav {
    background: #222;
    padding: 10px;
}
nav button {
    background: #ffcc00;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
}
nav button:hover {
    background: #fff200;
    color: black;
}
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 200px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.2s;
}
.card:hover {
    transform: translateY(-5px);
}
.card img {
    width: 100%;
    border-radius: 10px;
}
button {
    background: #ffcc00;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}
.cart {
    background: #111;
    color: white;
    padding: 20px;
    margin: 20px auto;
    border-radius: 12px;
    max-width: 400px;
}
.whatsapp, .instagram {
    position: fixed;
    left: 20px;
    padding: 12px 16px;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}
.whatsapp { bottom: 20px; background: #25D366; }
.instagram { bottom: 80px; background: #E1306C; }
</style>
</head>
<body>

<header>
<h1>Panther Charlie Apparels 🐆</h1>
<p>Anime • Military • Casual • Kurtis • Kurtas • Jeans • Trendy</p>
</header>

<nav>
<button onclick="showCategory('all')">All</button>
<button onclick="showCategory('anime')">Anime</button>
<button onclick="showCategory('military')">Military</button>
<button onclick="showCategory('men')">Men Casual/Kurta</button>
<button onclick="showCategory('women')">Women Casual/Kurti</button>
<button onclick="showCategory('jeans')">Jeans</button>
<button onclick="showCategory('trendy')">Trendy/H&M/Zara</button>
<button onclick="showCategory('others')">Others</button>
</nav>

<div class="products">
<!-- Example Product Cards -->
<div class="card" data-category="anime">
<img src="MOCKUP_NARUTO.jpg">
<h3>Naruto T-Shirt</h3>
<p>₹899</p>
<button onclick="addToCart(899)">Add to Cart</button>
</div>
<div class="card" data-category="military">
<img src="MOCKUP_ARMY.jpg">
<h3>Army T-Shirt</h3>
<p>₹850</p>
<button onclick="addToCart(850)">Add to Cart</button>
</div>
<div class="card" data-category="men">
<img src="MOCKUP_MEN_CASUAL.jpg">
<h3>Men Casual T-Shirt</h3>
<p>₹699</p>
<button onclick="addToCart(699)">Add to Cart</button>
</div>
<div class="card" data-category="women">
<img src="MOCKUP_WOMEN_TOP.jpg">
<h3>Women Casual Top</h3>
<p>₹749</p>
<button onclick="addToCart(749)">Add to Cart</button>
</div>
<div class="card" data-category="jeans">
<img src="MOCKUP_JEANS_WOMEN.jpg">
<h3>Women Skinny Jeans</h3>
<p>₹999</p>
<button onclick="addToCart(999)">Add to Cart</button>
</div>
<div class="card" data-category="trendy">
<img src="MOCKUP_TRENDY1.jpg">
<h3>Trendy Hoodie</h3>
<p>₹1199</p>
<button onclick="addToCart(1199)">Add to Cart</button>
</div>
<div class="card" data-category="others">
<img src="MOCKUP_BAG.jpg">
<h3>Backpack</h3>
<p>₹799</p>
<button onclick="addToCart(799)">Add to Cart</button>
</div>
</div>

<div class="cart">
<h2>Cart</h2>
<p id="items">Items: 0</p>
<p id="total">Total: ₹0</p>
<a id="paylink"><button>Pay via UPI</button></a>
</div>

<a class="whatsapp" href="https://wa.me/918838050624">WhatsApp</a>
<a class="instagram" href="https://www.instagram.com/_charlie__collections___97/" target="_blank">Instagram</a>

<script>
let items=0, total=0;
function addToCart(price){
    items++; total+=price;
    document.getElementById("items").innerText="Items: "+items;
    document.getElementById("total").innerText="Total: ₹"+total;
    document.getElementById("paylink").href=
        "upi://pay?pa=8838050624@upi&pn=Panther%20Charlie%20Apparels&am="+total+"&cu=INR";
}
function showCategory(cat){
    document.querySelectorAll('.card').forEach(card=>{
        if(cat==="all"){ card.style.display="block"; }
        else{ card.dataset.category===cat? card.style.display="block": card.style.display="none"; }
    });
}
</script>

</body>
</html>
