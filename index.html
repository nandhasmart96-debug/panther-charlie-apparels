<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panther Charlie Apparels</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:black;
color:#ffcc00;
padding:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:200px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:8px;
}

button{
background:#ffcc00;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.cart{
background:#111;
color:white;
padding:20px;
margin:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>Panther Charlie Apparels 🐆</h1>
<p>Anime | Casual | Military</p>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Naruto Anime T-Shirt</h3>
<p>₹899</p>
<button onclick="addToCart(899)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Casual T-Shirt</h3>
<p>₹699</p>
<button onclick="addToCart(699)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Army T-Shirt</h3>
<p>₹850</p>
<button onclick="addToCart(850)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>
<p id="items">Items: 0</p>
<p id="total">Total: ₹0</p>
<a id="paylink"><button>Pay via UPI</button></a>
</div>

<script>

let items=0;
let total=0;

function addToCart(price){
items++;
total+=price;

document.getElementById("items").innerText="Items: "+items;
document.getElementById("total").innerText="Total: ₹"+total;

document.getElementById("paylink").href=
"upi://pay?pa=8838050624@upi&pn=Panther%20Charlie%20Apparels&am="+total+"&cu=INR";

}

</script>

</body>
</html>
