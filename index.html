<!DOCTYPE html>

<style>

margin:0;
color:#333;

header{
background:#111;
color:#ffcc00;
padding:20px;
text-align:center;
}

.top-links{
margin-top:10px;
}

.top-links button{
margin:5px;
}

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin:20px;
}

.tab-btn{
padding:10px 15px;
background:#222;
color:#ffcc00;
border:none;
border-radius:5px;
cursor:pointer;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
width:180px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.card img{
width:100%;

}

button{
padding:8px 12px;
background:#ffcc00;
color:#111;
border:none;

cursor:pointer;

}

.cart{
background:#111;
color:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:400px;
border-radius:12px;
}

.contact{
background:#222;
color:#ffcc00;
padding:20px;
margin:20px auto;
width:90%;
max-width:400px;
border-radius:12px;
}

.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

.instagram{
position:fixed;
bottom:80px;
left:20px;
background:#E1306C;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

.admin-panel{
display:none;
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<h1>Panther Charlie Apparels 🐆</h1>
<p>Anime • Military • Casual • Jeans • Kurtis</p>

<div class="top-links">

<button onclick="ownerLogin()">Owner Login</button>
<button onclick="customerLogin()">Customer Login</button>
<button onclick="trackOrder()">Track Order</button>

</div>

</header>

<div class="tabs">

<button class="tab-btn" onclick="showCategory('all')">All</button>
<button class="tab-btn" onclick="showCategory('anime')">Anime</button>
<button class="tab-btn" onclick="showCategory('military')">Military</button>

</div>

<div class="products">

<div class="card" data-category="anime">
<img src="naruto.jpg">
<h3>Naruto Anime T-Shirt</h3>
<p>₹899</p>

</div>

</div>

</div>

<div class="cart">

<h2>Cart</h2>

<p id="items">Items: 0</p>

<p id="total">Total: ₹0</p>

<button onclick="placeOrder()">Place Order</button>

</div>

<div class="admin-panel" id="adminPanel">

<h2>Admin Upload Mockup</h2>

<input type="text" placeholder="Product Name"><br><br>

<input type="number" placeholder="Price"><br><br>

<input type="file"><br><br>

<button>Upload Product</button>

</div>

<div class="contact">

<h2>Contact Us</h2>

<p>📞 8838050624</p>

<p>📧 nandhasmart96@gmail.com</p>

<p>
📸 Instagram
<a href="https://instagram.com/panther_charlie_apparels" target="_blank">
@panther_charlie_apparels
</a>
</p>

<br>

<button onclick="reportProblem()">Report a Problem</button>

</div>

<a class="instagram" href="https://instagram.com/panther_charlie_apparels" target="_blank">
Instagram
</a>

<a class="whatsapp" href="https://wa.me/918838050624">
WhatsApp Order
</a>

<script>

let cartItems = 0;
let totalPrice = 0;

function addToCart(price){

cartItems++;
totalPrice += price;

document.getElementById("items").innerText="Items: "+cartItems;
document.getElementById("total").innerText="Total: ₹"+totalPrice;

}

function showCategory(cat){

const products=document.querySelectorAll(".card");

products.forEach(p=>{

if(cat==="all"){
p.style.display="block";
}else{
p.dataset.category===cat?p.style.display="block":p.style.display="none";
}

});

}

function ownerLogin(){

let pass=prompt("Enter Owner Password");

if(pass==="panther123"){

alert("Welcome Owner");

document.getElementById("adminPanel").style.display="block";

}else{

alert("Wrong Password");

}

}

function customerLogin(){

let email=prompt("Enter your email");

if(email){

alert("Welcome "+email);

}

}

function placeOrder(){

alert("Order Confirmed 🎉 \n\nThank you for choosing Panther Charlie Apparels 🐆");

}

function trackOrder(){

let id=prompt("Enter Order ID");

alert("Order "+id+" is Processing");

}

function reportProblem(){

let issue=prompt("Describe the problem");

if(issue){

window.location.href=
"mailto:nandhasmart96@gmail.com?subject=Website Problem&body="+issue;

}

}

</script>
